<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hidden Leaf Equity Research</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c0f;
    --bg2: #0f1318;
    --bg3: #141820;
    --bg4: #1a2028;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaed;
    --text2: #8a9ab0;
    --text3: #556070;
    --green: #00c076;
    --green-dim: #004d30;
    --red: #ff4d4d;
    --red-dim: #4d0000;
    --amber: #f0a500;
    --amber-dim: #3d2900;
    --blue: #4d9eff;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    height: 100%;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 40px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #topbar .brand {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--text);
    text-transform: uppercase;
  }
  #topbar .brand span { color: var(--green); }
  #topbar .ticker-tape {
    display: flex;
    gap: 24px;
    font-size: 11px;
    letter-spacing: 0.05em;
  }
  #topbar .ticker-tape .t { color: var(--text2); }
  #topbar .ticker-tape .v { color: var(--text); }
  #topbar .ticker-tape .up { color: var(--green); }
  #topbar .ticker-tape .dn { color: var(--red); }
  #topbar .clock { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; }

  /* ── LAYOUT ── */
  #layout {
    display: flex;
    height: calc(100vh - 40px);
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  #sidebar-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #sidebar-head .label {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
  }
  #new-btn {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 3px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #new-btn:hover { border-color: var(--green); color: var(--green); }

  #search-wrap {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  #search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 2px;
    outline: none;
    letter-spacing: 0.06em;
  }
  #search::placeholder { color: var(--text3); }
  #search:focus { border-color: var(--border2); }

  #report-list { overflow-y: auto; flex: 1; }

  .ritem {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }
  .ritem:hover { background: var(--bg3); }
  .ritem.active { background: var(--bg3); border-left-color: var(--green); }
  .ritem .rticker { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: var(--text); }
  .ritem .rname { font-size: 10px; color: var(--text3); margin-top: 2px; letter-spacing: 0.04em; font-family: var(--sans); }
  .ritem .rmeta { font-size: 10px; color: var(--text3); margin-top: 2px; letter-spacing: 0.04em; }
  .ritem .rbadge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    margin-top: 5px;
  }
  .rbadge.bull { background: var(--green-dim); color: var(--green); }
  .rbadge.bear { background: var(--red-dim); color: var(--red); }
  .rbadge.neutral { background: var(--bg4); color: var(--text2); border: 1px solid var(--border); }

  /* ── MAIN CONTENT ── */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px;
    background: var(--bg);
  }

  #report-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  #report-header .ticker-row { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  #report-header .h-ticker { font-size: 28px; font-weight: 600; letter-spacing: 0.06em; color: var(--text); }
  #report-header .h-company { font-family: var(--sans); font-size: 14px; color: var(--text2); font-weight: 300; }
  #report-header .h-meta {
    display: flex; flex-wrap: wrap; gap: 20px;
    margin-top: 10px; font-size: 11px; color: var(--text3); letter-spacing: 0.07em;
  }
  #report-header .h-meta span { }
  #report-header .h-meta .price { color: var(--text); font-weight: 500; }

  .section { margin-bottom: 24px; }
  .section-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text3);
    padding-bottom: 6px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-body {
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.8;
    color: var(--text2);
    font-weight: 300;
  }
  .verdict {
    padding: 14px 18px;
    background: var(--bg2);
    border-left: 2px solid var(--green);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    font-weight: 400;
  }
  .verdict.bear { border-left-color: var(--red); }

  /* empty */
  #empty {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 70vh;
    color: var(--text3);
    letter-spacing: 0.1em;
    font-size: 11px;
    gap: 10px;
    text-align: center;
  }
  #empty .empty-icon { font-size: 36px; opacity: 0.2; margin-bottom: 8px; }

  /* add report modal */
  #modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
  }
  #modal h3 {
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text2); margin-bottom: 20px;
  }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 10px; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 2px;
    outline: none;
    letter-spacing: 0.04em;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--border2); }
  .field textarea { min-height: 80px; resize: vertical; line-height: 1.6; font-family: var(--sans); }
  .field select option { background: var(--bg2); }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn {
    font-family: var(--mono);
    font-size: 11px; letter-spacing: 0.08em;
    padding: 7px 20px; border-radius: 2px;
    border: 1px solid var(--border2);
    cursor: pointer; background: none; color: var(--text2);
    transition: all 0.15s;
  }
  .btn:hover { color: var(--text); border-color: var(--text3); }
  .btn.primary { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }
  .btn.primary:hover { opacity: 0.9; }

  /* section adder */
  #sections-container .sec-row {
    display: grid; grid-template-columns: 160px 1fr 28px; gap: 8px;
    align-items: start; margin-bottom: 8px;
  }
  #sections-container .sec-row input { font-family: var(--mono); }
  .remove-sec {
    background: none; border: 1px solid var(--border);
    color: var(--text3); cursor: pointer; border-radius: 2px;
    font-size: 14px; height: 34px; width: 28px;
    display: flex; align-items: center; justify-content: center;
  }
  .remove-sec:hover { border-color: var(--red); color: var(--red); }
  #add-section-btn {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
    background: none; border: 1px dashed var(--border2);
    color: var(--text3); cursor: pointer; width: 100%;
    padding: 6px; border-radius: 2px; margin-top: 4px;
  }
  #add-section-btn:hover { border-color: var(--green); color: var(--green); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .fade-in { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="brand">HIDDEN <span>LEAF</span> EQUITY RESEARCH</div>
  <div class="ticker-tape">
    <span><span class="t">SPX </span><span class="v">5,312 </span><span class="up">+0.87%</span></span>
    <span><span class="t">NDX </span><span class="v">18,421 </span><span class="up">+1.12%</span></span>
    <span><span class="t">WTI </span><span class="v">82.44 </span><span class="dn">-0.21%</span></span>
    <span><span class="t">GOLD </span><span class="v">3,312 </span><span class="up">+0.55%</span></span>
  </div>
  <div class="clock" id="clock"></div>
</div>

<!-- LAYOUT -->
<div id="layout">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-head">
      <span class="label">COVERAGE (<span id="count">0</span>)</span>
      <button id="new-btn" onclick="openModal()">+ NEW</button>
    </div>
    <div id="search-wrap">
      <input id="search" placeholder="SEARCH TICKER / COMPANY..." oninput="filterList(this.value)" />
    </div>
    <div id="report-list"></div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="report-view"></div>
    <div id="empty">
      <div class="empty-icon">◈</div>
      <div>NO REPORTS</div>
      <div style="margin-top:4px; font-size:10px;">CLICK + NEW TO ADD YOUR FIRST THESIS</div>
    </div>
  </div>

</div>

<!-- ADD REPORT MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3>NEW RESEARCH REPORT</h3>
    <div class="modal-row">
      <div class="field">
        <label>Ticker</label>
        <input id="f-ticker" placeholder="AAPL" style="text-transform:uppercase;" />
      </div>
      <div class="field">
        <label>Exchange</label>
        <input id="f-exchange" placeholder="NASDAQ" style="text-transform:uppercase;" />
      </div>
    </div>
    <div class="field">
      <label>Company name</label>
      <input id="f-company" placeholder="Apple Inc." />
    </div>
    <div class="modal-row">
      <div class="field">
        <label>Price</label>
        <input id="f-price" placeholder="$182.50" />
      </div>
      <div class="field">
        <label>Market cap</label>
        <input id="f-mktcap" placeholder="$2.8T" />
      </div>
    </div>
    <div class="modal-row">
      <div class="field">
        <label>Author</label>
        <input id="f-author" placeholder="Luke" />
      </div>
      <div class="field">
        <label>Stance</label>
        <select id="f-stance">
          <option value="bull">▲ Bullish</option>
          <option value="bear">▼ Bearish</option>
          <option value="neutral">— Neutral</option>
        </select>
      </div>
    </div>

    <div class="field" style="margin-top:4px;">
      <label>Sections</label>
      <div id="sections-container"></div>
      <button id="add-section-btn" onclick="addSection()">+ ADD SECTION</button>
    </div>

    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">CANCEL</button>
      <button class="btn primary" onclick="saveReport()">SAVE REPORT</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'hler_reports_v1';

let reports = [];
let activeId = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) reports = JSON.parse(raw);
  } catch(e) { reports = []; }
  if (reports.length === 0) seedDefault();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(reports));
}

function seedDefault() {
  reports = [{
    id: Date.now(),
    ticker: 'TRLEF',
    company: 'Trillion Energy International Inc.',
    exchange: 'OTCQB',
    price: '$0.030',
    mktcap: '$8.15M CAD',
    author: 'Luke',
    date: 'APR 23 2026',
    stance: 'bull',
    sections: [
      { label: 'Company Overview', body: 'Trillion Energy is a micro-cap Canadian oil & gas explorer focused entirely on Türkiye. Incorporated in 2015 (formerly Park Place Energy), it holds a 49% working interest in the SASB offshore natural gas field in the Black Sea, a 19.6% stake in the Cendere oil field, and — as of early 2026 — a new agreement to earn a 29% working interest in the M47 Block in SE Turkey\'s Cudi-Gabar petroleum province. Headquartered in Vancouver. ~10 employees.', verdict: false },
      { label: 'Bull Case', body: 'The M47 block sits 12km from Turkey\'s biggest onshore oil discovery, in a province producing 81,000 boe/d from fields that didn\'t exist five years ago. Geology doesn\'t stop at property lines. At a ~$5–8M CAD market cap, the stock is pricing in near-zero exploration success — meaning any positive well result would reprice dramatically. A successful discovery could support a $50–75M+ CAD valuation, implying 8–12x from current levels on a post-consolidation basis. The macro backdrop helps: European energy security concerns make domestic Turkish oil commercially and politically valuable.', verdict: false },
      { label: 'Key Risks', body: 'Dry holes would likely be fatal. The company carries ~CAD$16.4M in convertible debentures due; if a CAD$10M+ brokered financing isn\'t completed by Sep 30 2026, the full balance becomes immediately payable. They need US$9.5M for the 2026 M47 work program alone — the current $2M private placement is insufficient, meaning further dilution is near-certain. Revenue fell 58% in 2024 to $7M with $9.1M in losses. No hedge funds hold the stock.', verdict: false },
      { label: 'Verdict', body: 'High-conviction lottery ticket structure. The bull case is real and internally consistent, but the probability distribution is heavily skewed toward loss. Size accordingly — treat as a position you are comfortable losing entirely.', verdict: true }
    ]
  }];
  save();
}

function renderList(filter) {
  const list = document.getElementById('report-list');
  const filtered = filter
    ? reports.filter(r => r.ticker.includes(filter.toUpperCase()) || r.company.toLowerCase().includes(filter.toLowerCase()))
    : reports;
  document.getElementById('count').textContent = reports.length;
  list.innerHTML = filtered.map(r => `
    <div class="ritem ${r.id === activeId ? 'active' : ''}" onclick="setActive(${r.id})">
      <div class="rticker">${r.ticker}</div>
      <div class="rname">${r.company}</div>
      <div class="rmeta">${r.date} · ${r.author}</div>
      <span class="rbadge ${r.stance}">${r.stance === 'bull' ? '▲ BULLISH' : r.stance === 'bear' ? '▼ BEARISH' : '— NEUTRAL'}</span>
    </div>
  `).join('');
}

function renderContent() {
  const view = document.getElementById('report-view');
  const empty = document.getElementById('empty');
  const r = reports.find(x => x.id === activeId);
  if (!r) {
    view.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';
  const sectionsHtml = r.sections.map(s => `
    <div class="section">
      <div class="section-label">${s.label}</div>
      <div class="${s.verdict ? `verdict ${r.stance === 'bear' ? 'bear' : ''}` : 'section-body'}">${s.body}</div>
    </div>
  `).join('');
  view.innerHTML = `
    <div class="fade-in">
      <div id="report-header">
        <div class="ticker-row">
          <span class="h-ticker">${r.ticker}</span>
          <span class="h-company">${r.company}</span>
        </div>
        <div class="h-meta">
          <span>${r.exchange}</span>
          <span class="price">${r.price}</span>
          <span>MKT CAP ${r.mktcap}</span>
          <span>BY ${r.author}</span>
          <span>${r.date}</span>
          <span class="rbadge ${r.stance}" style="font-size:9px;">${r.stance === 'bull' ? '▲ BULLISH' : r.stance === 'bear' ? '▼ BEARISH' : '— NEUTRAL'}</span>
        </div>
      </div>
      ${sectionsHtml}
      <div style="margin-top:28px; padding-top:16px; border-top:1px solid var(--border); display:flex; gap:10px;">
        <button class="btn" onclick="deleteReport(${r.id})" style="color:var(--red); border-color:var(--red-dim);">DELETE REPORT</button>
      </div>
    </div>
  `;
}

function setActive(id) {
  activeId = id;
  renderList();
  renderContent();
}

function filterList(q) { renderList(q); }

/* MODAL */
let sectionCount = 0;
function openModal() {
  document.getElementById('f-ticker').value = '';
  document.getElementById('f-exchange').value = '';
  document.getElementById('f-company').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-mktcap').value = '';
  document.getElementById('f-author').value = '';
  document.getElementById('f-stance').value = 'bull';
  document.getElementById('sections-container').innerHTML = '';
  sectionCount = 0;
  addSection('Bull Case', '');
  addSection('Key Risks', '');
  addSection('Verdict', '');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function addSection(label, body) {
  const id = sectionCount++;
  const wrap = document.createElement('div');
  wrap.className = 'sec-row';
  wrap.dataset.id = id;
  wrap.innerHTML = `
    <input placeholder="Section label" value="${label || ''}" class="sec-label" />
    <textarea placeholder="Section content..." class="sec-body" rows="3">${body || ''}</textarea>
    <button class="remove-sec" onclick="this.closest('.sec-row').remove()">×</button>
  `;
  document.getElementById('sections-container').appendChild(wrap);
}

function saveReport() {
  const ticker = document.getElementById('f-ticker').value.trim().toUpperCase();
  if (!ticker) { alert('Ticker is required'); return; }
  const rows = document.querySelectorAll('#sections-container .sec-row');
  const sections = [];
  rows.forEach(row => {
    const lbl = row.querySelector('.sec-label').value.trim();
    const bdy = row.querySelector('.sec-body').value.trim();
    if (lbl || bdy) sections.push({ label: lbl || 'Note', body: bdy, verdict: lbl.toLowerCase() === 'verdict' });
  });
  const now = new Date();
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const dateStr = `${months[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')} ${now.getFullYear()}`;
  const rep = {
    id: Date.now(),
    ticker,
    company: document.getElementById('f-company').value.trim() || ticker,
    exchange: document.getElementById('f-exchange').value.trim().toUpperCase() || 'OTC',
    price: document.getElementById('f-price').value.trim() || '—',
    mktcap: document.getElementById('f-mktcap').value.trim() || '—',
    author: document.getElementById('f-author').value.trim() || 'Anonymous',
    date: dateStr,
    stance: document.getElementById('f-stance').value,
    sections
  };
  reports.unshift(rep);
  save();
  activeId = rep.id;
  closeModal();
  renderList();
  renderContent();
}

function deleteReport(id) {
  if (!confirm('Delete this report?')) return;
  reports = reports.filter(r => r.id !== id);
  save();
  activeId = reports.length ? reports[0].id : null;
  renderList();
  renderContent();
}

/* CLOCK */
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s} EDT`;
}
setInterval(updateClock, 1000);
updateClock();

/* INIT */
load();
if (reports.length) activeId = reports[0].id;
renderList();
renderContent();

/* Close modal on overlay click */
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
</script>
</body>
</html>
